<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text-muted: #737373;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --user-bubble: #262626;
      --assistant-bubble: #1e1e1e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .user-badge {
      font-size: 0.8125rem;
      color: var(--text-muted);
      background: var(--user-bubble);
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
    }
    .user-badge.error { color: #f87171; }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 42rem;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
    }
    .message .role {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .message.loading .content::after {
      content: '';
      display: inline-block;
      width: 0.35em;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: -0.1em;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .input-area {
      padding: 1rem 1.5rem 1.5rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .input-wrap {
      max-width: 42rem;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 48px;
      max-height: 200px;
      padding: 0.75rem 1rem;
      font: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: var(--accent); }
    button {
      padding: 0.75rem 1.25rem;
      font: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      color: #0f0f0f;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-toast {
      max-width: 42rem;
      margin: 0 auto 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
    }
    .chat-id-bar {
      padding: 0.5rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .chat-id-bar label {
      font-size: 0.8125rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .chat-id-bar input {
      flex: 1;
      min-width: 200px;
      padding: 0.4rem 0.75rem;
      font: inherit;
      font-size: 0.8125rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
    }
    .chat-id-bar input:focus { border-color: var(--accent); }
    .chat-id-bar .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 100%;
    }
    .chat-id-bar .set-btn {
      padding: 0.4rem 0.75rem;
      font-size: 0.8125rem;
    }
    .chat-id-bar .status {
      font-size: 0.75rem;
      color: var(--accent);
    }
    .chat-id-bar .status.missing { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>Chat</h1>
    <div id="user-badge" class="user-badge">Loading…</div>
  </header>
  <div class="chat-id-bar">
    <label for="chat-id-input">Chat ID:</label>
    <input
      id="chat-id-input"
      type="text"
      placeholder="e.g. f842bc3a-2b06-4c07-9c93-60cc3aa32835"
      autocomplete="off"
    />
    <button type="button" id="set-chat-id" class="set-btn">Set</button>
    <span id="chat-id-status" class="status missing">Required: copy from melong.ai chat URL</span>
    <span class="hint">Open a chat on melong.ai and copy the ID from the URL (e.g. melong.ai/chat/<strong>f842bc3a-2b06-4c07-9c93-60cc3aa32835</strong>)</span>
  </div>
  <main id="messages"></main>
  <div class="input-area">
    <div id="error-toast" class="error-toast" style="display: none;"></div>
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Message…"
        rows="1"
      ></textarea>
      <button type="button" id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages')
    const inputEl = document.getElementById('input')
    const sendBtn = document.getElementById('send')
    const userBadgeEl = document.getElementById('user-badge')
    const errorToastEl = document.getElementById('error-toast')
    const chatIdInput = document.getElementById('chat-id-input')
    const setChatIdBtn = document.getElementById('set-chat-id')
    const chatIdStatus = document.getElementById('chat-id-status')

    const STORAGE_KEY = 'melong-chat-id'

    /** @returns {string} UUID v4 (e.g. 0f6a8c5b-04e5-4925-96fb-68ffe2b2a135) */
    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = (Math.random() * 16) | 0
        return (c === 'y' ? (r & 0x3) | 0x8 : r).toString(16)
      })
    }

    function getStoredChatId() {
      const fromUrl = new URLSearchParams(location.search).get('id')
      if (fromUrl && fromUrl.trim()) return fromUrl.trim()
      try {
        const stored = sessionStorage.getItem(STORAGE_KEY)
        if (stored && stored.trim()) return stored.trim()
      } catch (_) {}
      return ''
    }

    function setConversationId(id) {
      const val = (id || '').trim()
      conversationId = val || uuid()
      chatIdInput.value = val
      try {
        if (val) sessionStorage.setItem(STORAGE_KEY, val)
        else sessionStorage.removeItem(STORAGE_KEY)
      } catch (_) {}
      chatIdStatus.textContent = val
        ? 'Using chat: ' + (val.length > 24 ? val.slice(0, 8) + '…' + val.slice(-4) : val)
        : 'Required: copy from melong.ai chat URL'
      chatIdStatus.classList.toggle('missing', !val)
    }

    let conversationId = getStoredChatId() || uuid()
    setConversationId(conversationId)

    function showError(msg) {
      errorToastEl.textContent = msg
      errorToastEl.style.display = 'block'
      setTimeout(() => {
        errorToastEl.style.display = 'none'
      }, 5000)
    }

    async function loadUser() {
      try {
        const res = await fetch('/api/user')
        if (!res.ok) {
          userBadgeEl.textContent = 'Not signed in'
          userBadgeEl.classList.add('error')
          return
        }
        const user = await res.json()
        userBadgeEl.textContent = user.email ?? user.id ?? 'User'
        userBadgeEl.classList.remove('error')
      } catch {
        userBadgeEl.textContent = 'Failed to load user'
        userBadgeEl.classList.add('error')
      }
    }

    function appendMessage(role, content, options = {}) {
      const div = document.createElement('div')
      div.className = `message ${role}${options.loading ? ' loading' : ''}`
      div.dataset.messageId = options.messageId ?? ''
      div.innerHTML = `<div class="role">${role}</div><div class="content">${escapeHtml(content)}</div>`
      messagesEl.appendChild(div)
      messagesEl.scrollTop = messagesEl.scrollHeight
      return div
    }

    function escapeHtml(s) {
      const p = document.createElement('p')
      p.textContent = s
      return p.innerHTML
    }

    /** Extract streamed text from various SSE payload shapes (text-delta, OpenAI-style, etc.) */
    function getStreamDelta(obj) {
      if (!obj || typeof obj !== 'object') return ''
      if (obj.type === 'text-delta' && typeof obj.delta === 'string') return obj.delta
      const content = obj.choices?.[0]?.delta?.content
      if (typeof content === 'string') return content
      if (typeof obj.content === 'string') return obj.content
      if (typeof obj.text === 'string') return obj.text
      return ''
    }

    function updateMessageContent(el, text) {
      const content = el.querySelector('.content')
      if (!content) return
      content.innerHTML = escapeHtml(text).replace(/\n/g, '<br>')
      messagesEl.scrollTop = messagesEl.scrollHeight
    }

    async function sendMessage(text) {
      if (!text.trim()) return
      const chatId = (chatIdInput.value || conversationId || '').trim()
      if (!chatId) {
        showError('Set a Chat ID first (copy from melong.ai chat URL)')
        return
      }
      const userMessageId = uuid()
      appendMessage('user', text.trim())
      inputEl.value = ''
      sendBtn.disabled = true

      const assistantEl = appendMessage('assistant', '', { loading: true })

      const payload = {
        id: chatId,
        message: {
          role: 'user',
          parts: [{ type: 'text', text: text.trim() }],
          id: userMessageId,
        },
        selectedChatModel: 'chat-model',
        selectedVisibilityType: 'private',
      }

      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
        if (!res.ok) {
          const errText = await res.text()
          updateMessageContent(assistantEl, `Error: ${res.status} ${errText || res.statusText}`)
          assistantEl.classList.remove('loading')
          sendBtn.disabled = false
          return
        }
        assistantEl.classList.remove('loading')
        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''
        let fullText = ''
        let streamDone = false
        while (!streamDone) {
          const { done, value } = await reader.read()
          if (done) break
          buffer += decoder.decode(value, { stream: true })
          const lines = buffer.split(/\r?\n/)
          buffer = lines.pop() ?? ''
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue
            const payload = line.slice(6).trim()
            if (payload === '[DONE]') {
              streamDone = true
              break
            }
            try {
              const obj = JSON.parse(payload)
              const delta = getStreamDelta(obj)
              if (typeof delta === 'string' && delta.length > 0) {
                fullText += delta
                updateMessageContent(assistantEl, fullText)
              }
            } catch (_) {}
          }
        }
        if (!streamDone && buffer.startsWith('data: ')) {
          const payload = buffer.slice(6).trim()
          if (payload !== '[DONE]') {
            try {
              const obj = JSON.parse(payload)
              const delta = getStreamDelta(obj)
              if (typeof delta === 'string') fullText += delta
            } catch (_) {}
          }
        }
        updateMessageContent(assistantEl, fullText)
        if (!fullText.trim()) updateMessageContent(assistantEl, '(No response)')
      } catch (err) {
        assistantEl.classList.remove('loading')
        updateMessageContent(assistantEl, `Error: ${err.message}`)
        showError(err.message)
      }
      sendBtn.disabled = false
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        sendMessage(inputEl.value)
      }
    })
    sendBtn.addEventListener('click', () => sendMessage(inputEl.value))

    setChatIdBtn.addEventListener('click', () => {
      setConversationId(chatIdInput.value)
    })
    chatIdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault()
        setConversationId(chatIdInput.value)
      }
    })

    loadUser()
  </script>
</body>
</html>
